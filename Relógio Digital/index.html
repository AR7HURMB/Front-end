<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Relógio Digital</title>
</head>
<body>
    <div class="clock">
        <div class="time-div" id="hours-div">
            <span class="time" id="hours"></span>
            <span class="time-caption">Horas</span>
        </div>
        <div class="time-div" id="minutes-div">
            <span class="time" id="minutes"></span>
            <span class="time-caption">Minutos</span>
        </div>
        <div class="time-div" id="seconds-div">
            <span class="time" id="seconds"></span>
            <span class="time-caption">Segundos</span>
        </div>
    </div>
</body>
</html>
